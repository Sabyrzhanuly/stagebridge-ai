services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: stagebridge
      POSTGRES_PASSWORD: stagebridge
      POSTGRES_DB: postgres
    ports:
      - "55432:5432"
    volumes:
      - stagebridge_pgdata:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stagebridge -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,backend
      BACKEND_DB_ENGINE: postgres
      BACKEND_DB_HOST: postgres
      BACKEND_DB_PORT: "5432"
      BACKEND_DB_NAME: stagebridge_backend
      BACKEND_DB_USER: stagebridge
      BACKEND_DB_PASSWORD: stagebridge
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: stagebridge
      POSTGRES_PASSWORD: stagebridge
      PROD_DB_HOST: postgres
      DEV_DB_HOST: postgres
      STAGE_DB_HOST: postgres
      DRYRUN_DB_HOST: postgres
      PG_STATEMENT_TIMEOUT_MS: ${PG_STATEMENT_TIMEOUT_MS:-5000}
      ALLOW_EXTERNAL_DB_HOSTS: ${ALLOW_EXTERNAL_DB_HOSTS:-0}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000/api
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  stagebridge_pgdata:
