services:
  appdb:
    image: postgres:15-alpine
    # Не публикуем порт наружу — доступ только по внутренней сети compose.
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    environment:
      POSTGRES_USER: pgadmin
      POSTGRES_PASSWORD: ${APPDB_PASSWORD}
      POSTGRES_DB: pgadmin
    volumes:
      - appdb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgadmin"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    # Пароль + не публикуем порт наружу.
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    # Свой пользователь вместо guest/guest + не публикуем порты наружу.
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    environment:
      RABBITMQ_DEFAULT_USER: pgadmin
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      # Поднимаем ack-таймаут консьюмера (иначе длинные клоны/бэкапы рвутся на 30 мин).
      - ./rabbitmq/consumer-timeout.conf:/etc/rabbitmq/conf.d/20-consumer-timeout.conf:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    mem_limit: 768m
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-exclude "alembic/*" --timeout-graceful-shutdown 2
    volumes:
      - ./backend:/app
      - pg_client_lib:/usr/lib/postgresql
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      appdb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker:
    build: ./backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # Побольше памяти: worker гоняет pg_dump/pg_restore/клоны.
    mem_limit: 2g
    command: python -m app.tasks.worker_main
    volumes:
      - ./backend:/app
      - pg_client_lib:/usr/lib/postgresql
      # Дампы сценариев: переживают пересоздание контейнера → можно переиспользовать при повторе.
      - scenario_dumps:/var/lib/pgadmin/scenario_dumps
    env_file: .env
    depends_on:
      appdb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  scheduler:
    build: ./backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    command: celery -A app.tasks.celery_app beat -l info
    volumes:
      - ./backend:/app
    env_file: .env
    depends_on:
      appdb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    mem_limit: 128m
    ports:
      - "80:80"
    depends_on:
      - backend

  # Локальное S3-хранилище (MinIO) для демо-бэкапов.
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    mem_limit: 512m
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      retries: 10

  # Одноразовая задача: создать bucket для бэкапов в MinIO.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin123 &&
      mc mb --ignore-existing local/backups &&
      echo 'bucket backups готов'
      "

  # Демо-PostgreSQL для показа: серверы/мониторинг/диагностика/бэкапы/structure-sync.
  demopg:
    image: postgres:16-alpine
    restart: unless-stopped
    mem_limit: 256m
    # pg_stat_statements — чтобы работал мониторинг медленных запросов и AI Query Advisor
    command: ["postgres", "-c", "shared_preload_libraries=pg_stat_statements", "-c", "pg_stat_statements.track=all"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: demopass
      POSTGRES_DB: demo_shop
    volumes:
      - demopg_data:/var/lib/postgresql/data
      - ./infra/demopg-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 10

volumes:
  appdb_data:
  pg_client_lib:
  scenario_dumps:
  demopg_data:
  minio_data:
