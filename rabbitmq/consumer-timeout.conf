# Прод-клоны и бэкапы больших БД идут дольше дефолтных 30 минут RabbitMQ.
# При Celery task_acks_late=True подтверждение (ack) уходит ТОЛЬКО после
# завершения задачи — поэтому короткий consumer_timeout рвёт канал
# (amqp PreconditionFailed 406) прямо посреди клона: прогресс обрывается,
# а задача переотправляется (task_reject_on_worker_lost=True) и клон идёт дважды.
#
# Поднимаем до 6 часов — с запасом на крупные клоны. Зависшие задачи ловит
# отдельный app-level reaper (Celery inspect), а не этот таймаут.
consumer_timeout = 21600000
