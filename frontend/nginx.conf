server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Безопасность ──
    server_tokens off;                       # не светим версию nginx
    client_max_body_size 100m;               # защита от DoS гигантским телом

    # Заголовки безопасности (always — в т.ч. на ответах-ошибках).
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # Google Fonts (Fira Code/Sans) грузятся с googleapis/gstatic — разрешаем точечно.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' ws: wss:; object-src 'none'; frame-ancestors 'none'; base-uri 'self'" always;
    # HSTS включить, КОГДА фронт встанет за TLS-терминатором (на голом HTTP браузер игнорирует):
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ws {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
